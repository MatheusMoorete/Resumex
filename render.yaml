services:
  - type: web
    name: resumex
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_AUTH_PROVIDER
        value: supabase
      - key: AUTH_PROVIDER
        value: supabase
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_PARENT_PAGE_ID
        sync: false
      - key: NOTION_CLIENT_ID
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false
      - key: NOTION_REDIRECT_URI
        sync: false
      - key: AI_UPSTREAM_TIMEOUT_MS
        value: 600000
